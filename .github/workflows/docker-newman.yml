name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container
        run: |
          docker run -d --rm \
            --name fit4110-iot-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/iot-ingestion:lab04

      - name: Wait for service health
        run: |
          echo "Waiting for service to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Attempt $i: not ready, retrying in 2s..."
            sleep 2
          done
          echo "Service did not start in time"
          docker logs fit4110-iot-lab04 || true
          exit 1

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: docker logs fit4110-iot-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/